# ================================================
# tmux config — cyber-punk theme
# ================================================

# --- Base settings ---
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g set-titles on
set -g history-limit 10000
set -g escape-time 10
set -g mouse on
set -g mode-keys vi

# --- Vim-like keybindings ---

# Pane navigation (prefix + hjkl)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-style splits
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Resize panes (prefix + H/J/K/L, repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

# Alt+arrows for window navigation
bind -n M-Left previous-window
bind -n M-Right next-window

# --- Cyber-punk colors ---

# Status bar background/text
set -g status-style bg=#0d0018,fg=#DDA0FF

# Left side — session name with purple bg
set -g status-left "#[bg=#9B30FF,fg=#FFFFFF]  #S #[bg=#0d0018,fg=#9B30FF]"
set -g status-left-length 40

# Right side — time/date with dark purple bg
set -g status-right "#[fg=#4a0080]#[bg=#4a0080,fg=#DDA0FF]  %H:%M  %d-%b-%y "
set -g status-right-length 80

# Window tabs — current vs inactive
set -g window-status-format " #I:#W "
set -g window-status-current-format " #[bg=#8B00FF,fg=#FFFFFF] #I:#W #[bg=#0d0018,fg=#8B00FF]"
set -g window-status-style bg=#080010,fg=#666666
set -g window-status-current-style bg=#8B00FF,fg=#FFFFFF
set -g window-status-activity-style bg=#FF0044,fg=#FFFFFF
set -g window-status-separator ""

# Pane borders
set -g pane-active-border-style bg=#1a0030,fg=#FF00FF
set -g pane-border-style bg=#080010,fg=#4a0080

# Messages and command output
set -g message-style bg=#8B00FF,fg=#FFFFFF
set -g message-command-style bg=#1a0030,fg=#DDA0FF
set -g mode-style bg=#FF00FF,fg=#000000

# Pane number display (prefix + q)
set -g display-panes-active-colour "#FF00FF"
set -g display-panes-colour "#4a0080"

# Clock
set -g clock-mode-colour "#FF00FF"
